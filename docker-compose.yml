services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: media_scraper
      POSTGRES_USER: media_scraper
      POSTGRES_PASSWORD: media_scraper
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U media_scraper']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgresql://media_scraper:media_scraper@postgres:5432/media_scraper
    depends_on:
      postgres: { condition: service_healthy }

  api:
    build:
      context: .
      target: api
    environment:
      DATABASE_URL: postgresql://media_scraper:media_scraper@postgres:5432/media_scraper
      REDIS_URL: redis://redis:6379
      API_ACCESS_TOKEN: ${API_ACCESS_TOKEN}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      PROFILE_DISCOVERY_CACHE_TTL_SECONDS: ${PROFILE_DISCOVERY_CACHE_TTL_SECONDS:-600}
      PROFILE_DISCOVERY_TIMEOUT_MS: ${PROFILE_DISCOVERY_TIMEOUT_MS:-45000}
      MEDIA_ROOT: /data/media
      CREDENTIALS_ROOT: /data/credentials
      BROWSERLESS_URL: http://browserless:3000
      BROWSERLESS_TOKEN: ${BROWSERLESS_TOKEN:-}
      MEDIA_STORAGE_DRIVER: ${MEDIA_STORAGE_DRIVER:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_PRESIGNED_URL_TTL_SECONDS: ${S3_PRESIGNED_URL_TTL_SECONDS:-900}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:${WEB_PORT:-5173}}
    ports:
      - '127.0.0.1:3000:3000'
    volumes:
      - media-data:/data/media
      - credential-data:/data/credentials
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      browserless: { condition: service_healthy }

  browserless:
    image: ghcr.io/browserless/chromium:v2.55.0
    restart: unless-stopped
    environment:
      TOKEN: ${BROWSERLESS_TOKEN:-}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/pressure']
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      target: worker
    environment:
      DATABASE_URL: postgresql://media_scraper:media_scraper@postgres:5432/media_scraper
      REDIS_URL: redis://redis:6379
      MEDIA_ROOT: /data/media
      CREDENTIALS_ROOT: /data/credentials
      COLLECTION_CONCURRENCY: ${COLLECTION_CONCURRENCY:-}
      MAX_ASSET_BYTES: ${MAX_ASSET_BYTES:-104857600}
      MAX_COLLECTION_BYTES: ${MAX_COLLECTION_BYTES:-524288000}
      MAX_MEDIA_STORAGE_BYTES: ${MAX_MEDIA_STORAGE_BYTES:-4294967296}
      MEDIA_RETENTION_TRIGGER_PERCENT: ${MEDIA_RETENTION_TRIGGER_PERCENT:-80}
      MEDIA_RETENTION_TARGET_PERCENT: ${MEDIA_RETENTION_TARGET_PERCENT:-70}
      VIDEO_MAX_DIMENSION: ${VIDEO_MAX_DIMENSION:-1280}
      EXTRACTION_TIMEOUT_MS: ${EXTRACTION_TIMEOUT_MS:-1800000}
      OPTIMIZATION_TIMEOUT_MS: ${OPTIMIZATION_TIMEOUT_MS:-600000}
      METADATA_CONCURRENCY: ${METADATA_CONCURRENCY:-4}
      MEDIA_STORAGE_DRIVER: ${MEDIA_STORAGE_DRIVER:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_PRESIGNED_URL_TTL_SECONDS: ${S3_PRESIGNED_URL_TTL_SECONDS:-900}
    volumes:
      - media-data:/data/media
      - credential-data:/data/credentials:ro
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }

  web:
    build:
      context: .
      target: web
      args:
        API_PROXY_URL: http://api:3000
    ports:
      - '127.0.0.1:${WEB_PORT:-5173}:4173'
    depends_on:
      - api

volumes:
  credential-data:
  media-data:
  postgres-data:
  redis-data:
